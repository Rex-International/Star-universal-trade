<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SUT Firebase Connected</title>
</head>

<body>

<h2>STAR UNIVERSAL TRADE (SUT)</h2>

<!-- 🔐 AUTH MODAL -->
<div id="sut-auth-modal">

  <h3>Login / Register</h3>

  <input type="email" id="auth-email" placeholder="Email"><br><br>
  <input type="password" id="auth-password" placeholder="Password"><br><br>

  <button onclick="registerWithEmail(
    document.getElementById('auth-email').value,
    document.getElementById('auth-password').value
  )">
    SIGN UP
  </button>

  <button onclick="loginWithEmail(
    document.getElementById('auth-email').value,
    document.getElementById('auth-password').value
  )">
    LOGIN
  </button>

  <button onclick="loginWithGoogle()">
    GOOGLE LOGIN
  </button>

</div>

<hr>

<!-- 📦 PRODUCT FORM -->
<h3>Upload Product</h3>

<input type="text" id="p-title" placeholder="Product Title"><br><br>
<input type="number" id="p-price" placeholder="Price"><br><br>

<button onclick="uploadProductToFirebase()">
  UPLOAD PRODUCT
</button>

<hr>

<button onclick="logoutUser()">LOGOUT</button>

<script type="module" src="./firebase.js"></script>

<script type="module">
import { saveProduct } from "./firebase.js";

window.uploadProductToFirebase = async function () {

  const product = {
    title: document.getElementById("p-title").value,
    price: document.getElementById("p-price").value,
    vendor: window.currentUser?.email || "Guest",
    country: "Tanzania"
  };

  await saveProduct(product);

  alert("🚀 Product imehifadhiwa Firebase!");
};
</script>

</body>
</html>
